<!DOCTYPE html>
<html>
<head>
<title>Water Monitoring Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f4f6f8;
}

h1 { color: #2c3e50; }

table {
    margin: auto;
    border-collapse: collapse;
    width: 70%;
    background: white;
}

th, td {
    padding: 10px;
    border: 1px solid #ccc;
}

th {
    background: #3498db;
    color: white;
}

.normal { color: green; }
.high { color: orange; }
.leak { color: red; }

button {
    padding: 10px 20px;
    margin: 20px;
}

canvas {
    margin-top: 30px;
}
</style>

</head>

<body>

<h1>💧 Water Monitoring Dashboard</h1>

<button onclick="loadData()">Load Data</button>

<table id="table">
<tr>
<th>ID</th>
<th>Device ID</th>
<th>Water Used</th>
<th>Status</th>
</tr>
</table>

<canvas id="chart"></canvas>

<script>
let chart;

function loadData() {
 fetch("fetch.php")
  .then(res => res.json())
  .then(data => {

    let table = document.getElementById("table");

    table.innerHTML = `
    <tr>
      <th>ID</th>
      <th>Device ID</th>
      <th>Water Used</th>
      <th>Status</th>
    </tr>`;

    let labels = [];
    let values = [];

    data.forEach((item, index) => {

      let statusClass = "normal";
      if(item.status === "High Usage") statusClass = "high";
      if(item.status === "Possible Leakage") statusClass = "leak";

      table.innerHTML += `
        <tr>
          <td>${index + 1}</td>
          <td>${item.device_id}</td>
          <td>${item.water_used} L</td>
          <td class="${statusClass}">${item.status}</td>
        </tr>`;

      labels.push("Record " + (index+1));
      values.push(item.water_used);
    });

    drawChart(labels, values);
  });
}

function drawChart(labels, values) {

  let ctx = document.getElementById('chart').getContext('2d');

  if(chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: 'Water Usage (Liters)',
        data: values
      }]
    }
  });
}
</script>

</body>
</html>

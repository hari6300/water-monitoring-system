<!DOCTYPE html>
<html>
<body>
<h1>Water Monitoring System</h1>
<button onclick="loadData()">Load Data</button>
<pre id="output"></pre>

<script>
function loadData() {
 fetch("fetch.php")
  .then(res => res.json())
  .then(data => {
    document.getElementById("output").innerText =
      JSON.stringify(data, null, 2);
  });
}
</script>
</body>
</html>

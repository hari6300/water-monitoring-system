<!DOCTYPE html>
<html>
<head>
  <title>Water Monitoring System</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h1>Water Monitoring Dashboard</h1>

<button onclick="loadData()">Load Data</button>

<h3>Table Data</h3>
<table border="1" id="table">
  <tr>
    <th>Device ID</th>
    <th>Water Used</th>
    <th>Status</th>
  </tr>
</table>

<h3>Chart</h3>
<canvas id="chart" width="400" height="200"></canvas>

<script>
function loadData() {
  fetch("data.json")
    .then(res => res.json())
    .then(data => {

      let table = document.getElementById("table");

      // clear old rows
      table.innerHTML = `
        <tr>
          <th>Device ID</th>
          <th>Water Used</th>
          <th>Status</th>
        </tr>
      `;

      let labels = [];
      let values = [];

      data.forEach(item => {
        // table
        let row = `<tr>
          <td>${item.device_id}</td>
          <td>${item.water_used}</td>
          <td>${item.status}</td>
        </tr>`;
        table.innerHTML += row;

        // chart data
        labels.push(item.device_id);
        values.push(item.water_used);
      });

      // chart
      new Chart(document.getElementById("chart"), {
        type: "bar",
        data: {
          labels: labels,
          datasets: [{
            label: "Water Usage",
            data: values
          }]
        }
      });

    });
}
</script>

</body>
</html>

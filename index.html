<!DOCTYPE html>
<html>
<head>
  <title>Water Monitoring Dashboard</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h1>Water Monitoring Dashboard</h1>

<button onclick="loadData()">Load Data</button>

<h2>Table View</h2>
<table border="1" id="table">
  <tr>
    <th>Device ID</th>
    <th>Water Used</th>
    <th>Status</th>
  </tr>
</table>

<h2>Chart View</h2>
<canvas id="chart" width="400" height="200"></canvas>

<script>
function loadData() {
fetch("data.json")
  .then(res => res.json())
  .then(data => {

    let table = document.getElementById("table");

    let labels = [];
    let values = [];

    // Clear old rows
    table.innerHTML = `
      <tr>
        <th>Device ID</th>
        <th>Water Used</th>
        <th>Status</th>
      </tr>`;

    data.forEach(item => {

      let row = table.insertRow();

      row.insertCell(0).innerText = item.device_id;
      row.insertCell(1).innerText = item.water_used;
      row.insertCell(2).innerText = item.status;

      labels.push(item.device_id + "-" + item.water_used);
      values.push(item.water_used);
    });

    // Draw chart
    new Chart(document.getElementById("chart"), {
      type: "bar",
      data: {
        labels: labels,
        datasets: [{
          label: "Water Usage",
          data: values
        }]
      }
    });

  });
}
</script>

</body>
</html>
